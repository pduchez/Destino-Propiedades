<!doctype html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  ACCESO VENTAS · Panel administrativo / CRM de DestinoPropiedades.com ║
  ╠══════════════════════════════════════════════════════════════════════╣
  ║  ESTE ARCHIVO ES UN MARCADOR TEMPORAL.                                ║
  ║                                                                       ║
  ║  Desarrollador del CRM: reemplazá el contenido de esta carpeta        ║
  ║  (public/crm/) por el BUILD ESTÁTICO de tu panel (index.html +        ║
  ║  assets). Al hacer push, GitHub Pages lo publica en vivo en:          ║
  ║      <dominio>/crm/                                                    ║
  ║  Ver instrucciones completas en public/crm/README.md                  ║
  ╚══════════════════════════════════════════════════════════════════════╝

<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Acceso ventas — DestinoPropiedades.com</title>
    <style>
      :root { --navy:#0f2438; --navy2:#1c3b59; --sand:#c9a463; --cream:#faf7f2; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, var(--navy2), var(--navy));
        color: var(--cream); padding: 24px;
      }
      .card {
        max-width: 460px; text-align: center; background: rgba(255,255,255,.04);
        border: 1px solid rgba(250,247,242,.12); border-radius: 20px; padding: 40px 32px;
      }
      .badge {
        display: inline-flex; gap: 8px; align-items: center; font-size: 13px;
        text-transform: uppercase; letter-spacing: .12em; color: var(--sand); margin-bottom: 16px;
      }
      h1 { font-size: 24px; margin: 0 0 10px; }
      p { color: rgba(250,247,242,.72); line-height: 1.5; font-size: 15px; margin: 0 0 8px; }
      .note { font-size: 13px; color: rgba(250,247,242,.5); margin-top: 22px; }
      a.btn {
        display: inline-block; margin-top: 22px; background: var(--sand); color: var(--navy);
        font-weight: 700; text-decoration: none; padding: 12px 22px; border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">🔒 Acceso ventas</div>
      <h1>Panel en preparación</h1>
      <p>
        El panel administrativo / CRM para la fuerza de ventas de
        DestinoPropiedades.com se está integrando en esta sección.
      </p>
      <p class="note">
        ¿Sos el desarrollador del CRM? Cargá tu build estático en
        <code>public/crm/</code> (ver <code>README.md</code> de esa carpeta).
      </p>
    </div>
  </body>
</html>
